  async get(key) {
    const v = localStorage.getItem(key);
    return v === null ? null : { value: v };
  },
  async set(key, value) {

const KASUS_LONG = { A: "Akkusativ", D: "Dativ", N: "Nominativ" };
const ALL_ITEMS = PARTS.flatMap((p) => p.items);
const ORANGE = "#EA5206", ORANGE_L = "#F2884B", GREEN = "#27ae60", RED = "#c0392b";

// Niveau-Farben wie in der Masterliste: A2 grün, B1 mittelblau, B2 dunkelblau
const LEVEL_COLORS = {
  A2: { main: "#388E3C", soft: "#e8f3e9", border: "#bcdcbe" },
  B1: { main: "#3787D4", soft: "#e6f0fa", border: "#bcd6ee" },
  B2: { main: "#0C447C", soft: "#e4ebf3", border: "#b6c6da" },
};
function levelColor(niveau) { return LEVEL_COLORS[niveau] || LEVEL_COLORS.A2; }

// alle sauberen "Präposition + Kasus"-Kombinationen (für Distraktoren im Präp-Modus)
const ALL_COMBOS = Array.from(new Set(
  ALL_ITEMS.filter((x) => x.praepOk && KASUS_LONG[x.kasus]).map((x) => `${x.prep} + ${KASUS_LONG[x.kasus]}`)
));

function shuffle(a) {
  a = [...a];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

// ---- Fragen je Modus ----
function makePraepQuestion(it) {
  // alle gültigen Kombinationen dieses Wortes zählen als richtig
  const valid = it.validCombos && it.validCombos.length ? it.validCombos : [`${it.prep} + ${KASUS_LONG[it.kasus]}`];
  const correct = `${it.prep} + ${KASUS_LONG[it.kasus]}`;
  const otherKasus = KASUS_LONG[it.kasus] === "Akkusativ" ? "Dativ" : "Akkusativ";

  // mehr Distraktoren, je mehr gültige Kombinationen das Verb hat (sonst zu leicht)
  // 1 gültige -> 3 Distraktoren (4 Optionen); jede weitere gültige -> +2 Distraktoren
  const distractorTarget = 3 + (valid.length - 1) * 2;

  const distractors = new Set();
  // Falle „gleiche Präp, anderer Kasus" nur bei Wechselpräpositionen (sonst didaktisch wertlos)
  if (it.wechsel) {
    const trap = `${it.prep} + ${otherKasus}`;
    if (!valid.includes(trap)) distractors.add(trap);
  }
  // weitere Distraktoren aus echten Kombinationen, die für dieses Wort NICHT gültig sind
  shuffle(ALL_COMBOS.filter((c) => !valid.includes(c))).forEach((c) => { if (distractors.size < distractorTarget) distractors.add(c); });

  const opts = shuffle([correct, ...Array.from(distractors)]);
  if (!opts.includes(correct)) opts[0] = correct;
  const hint = valid.length > 1 ? `${it.wort} … ?  (mehrere möglich)` : `${it.wort} … ?  (${it.cn})`;
  return { it, label: "Präposition + Kasus?", stem: hint, options: opts, correct, validSet: valid };
}

function makeBedeutungQuestion(it) {
  const correct = it.cn;
  // Distraktoren dürfen keine Bedeutung sein, die für DIESES Wort ebenfalls gilt (z.B. Synonyme)
  const banned = new Set(it.validCns && it.validCns.length ? it.validCns : [correct]);
  const pool = shuffle(ALL_ITEMS.filter((x) => !banned.has(x.cn)));
  // eindeutige Distraktor-Bedeutungen sammeln
  const seen = new Set([correct]);
  const distract = [];
  for (const x of pool) { if (!seen.has(x.cn)) { seen.add(x.cn); distract.push(x.cn); } if (distract.length >= 3) break; }
  const opts = shuffle([correct, ...distract]);
  return { it, label: "Was bedeutet das?", stem: `${it.wort}  (${it.combo})`, options: opts, correct, validSet: [correct] };
}

function buildQueue(items, mode, strength) {
  // im Präp-Modus nur Karten mit sauberer Präp+Kasus
  const pool = mode === "praep" ? items.filter((it) => it.praepOk) : items;
  // schwache/neue Karten zuerst (pro Modus getrennte Stärke)
  const ordered = [...pool].sort((a, b) => {
    const sa = strength[mode + "|" + cardKey(a)] || 0;
    const sb = strength[mode + "|" + cardKey(b)] || 0;
    if (sa !== sb) return sa - sb;
    return Math.random() - 0.5;
  });
  const fn = mode === "praep" ? makePraepQuestion : makeBedeutungQuestion;
  return ordered.map(fn);
}

// ---- Speicher (pro Modus getrennt) ----
async function loadJSON(key, fb) { try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fb; } catch { return fb; } }
async function saveJSON(key, v) { try { await window.storage.set(key, JSON.stringify(v)); } catch {} }
function cardKey(it) { return it.wort + "|" + it.combo; }

function App() {
  const [mode, setMode] = useState(null);          // 'praep' | 'bedeutung'
  const [part, setPart] = useState(null);
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [session, setSession] = useState({ correct: 0, total: 0 });
  const [streak, setStreak] = useState(0);
  const [filter, setFilter] = useState("Alle");
  const [progress, setProgress] = useState({});    // { 'praep|partId': {best,done}, 'bedeutung|partId': {...} }
  const [strength, setStrength] = useState({});     // { 'praep|cardKey': n, 'bedeutung|cardKey': n }
  const [seen, setSeen] = useState(() => new Set()); // Karten, die in dieser Runde schon dran waren (für ehrliche Quote)

  useEffect(() => {
    loadJSON("drill2mode_prog", {}).then(setProgress);
    loadJSON("drill2mode_strength", {}).then(setStrength);
  }, []);

  const q = queue[idx];

  function startPart(p) {
    setQueue(buildQueue(p.items, mode, strength));
    setIdx(0); setPicked(null); setStreak(0);
    setSession({ correct: 0, total: 0 });
    setSeen(new Set());
    setPart(p);
  }

  function pick(opt) {
    if (picked) return;
    setPicked(opt);
    const validSet = q.validSet || [q.correct];
    const ok = validSet.includes(opt);

    // Quote zählt nur den ERSTEN Versuch pro Karte in dieser Runde (ehrliche Trefferquote)
    const ck = cardKey(q.it);
    const firstAttempt = !seen.has(ck);
    if (firstAttempt) {
      setSeen((prev) => { const n = new Set(prev); n.add(ck); return n; });
      setSession((s) => ({ correct: s.correct + (ok ? 1 : 0), total: s.total + 1 }));
    }
    setStreak((s) => (ok ? s + 1 : 0));

    const key = mode + "|" + ck;
    const ns = { ...strength };
    const prev = ns[key] || 0;
    ns[key] = ok ? Math.min(prev + 1, 5) : 0;
    setStrength(ns); saveJSON("drill2mode_strength", ns);

    if (!ok) {
      setQueue((Q) => {
        const insertAt = Math.min(idx + 4, Q.length);
        const repeat = mode === "praep" ? makePraepQuestion(q.it) : makeBedeutungQuestion(q.it);
        return [...Q.slice(0, insertAt), repeat, ...Q.slice(insertAt)];
      });
    }
  }

  function next() {
    setPicked(null);
    if (idx + 1 >= queue.length) {
      const pct = Math.round((session.correct / session.total) * 100);
      const pkey = mode + "|" + part.id;
      const np = { ...progress };
      const prev = np[pkey]?.best || 0;
      np[pkey] = { best: Math.max(prev, pct), done: true };
      setProgress(np); saveJSON("drill2mode_prog", np);
      setPart(null);
      return;
    }
    setIdx(idx + 1);
  }

  const S = {
    wrap: { fontFamily: "'Noto Sans TC','Segoe UI',system-ui,sans-serif", maxWidth: 620, margin: "0 auto", padding: "26px 18px 60px", color: "#1f2937" },

    btn: { background: ORANGE, color: "#fff", border: "none", borderRadius: 12, padding: "14px 24px", fontSize: 16, fontWeight: 600, cursor: "pointer", width: "100%", boxShadow: "0 2px 10px rgba(234,82,6,0.25)" },
    backBtn: { background: "transparent", color: ORANGE, border: "none", fontSize: 14, fontWeight: 600, cursor: "pointer", padding: 0, marginBottom: 14 },

    modeBtn: { display: "block", width: "100%", textAlign: "left", background: "#fff", border: "1px solid #f0e3da", borderRadius: 16, padding: "20px 22px", cursor: "pointer", fontFamily: "inherit", marginBottom: 12, boxShadow: "0 2px 12px rgba(234,82,6,0.05)" },
  };

  function optStyle(opt) {
    const base = { display: "block", width: "100%", textAlign: "left", padding: "14px 17px", marginBottom: 10, borderRadius: 13, border: "1.5px solid #e5e7eb", background: "#fff", fontSize: 18, cursor: picked ? "default" : "pointer", fontFamily: "inherit", transition: "all .12s" };
    if (!picked) return base;
    const validSet = q.validSet || [q.correct];
    if (validSet.includes(opt)) return { ...base, borderColor: GREEN, background: "#ecfdf5", color: GREEN, fontWeight: 600 };
    if (opt === picked) return { ...base, borderColor: RED, background: "#fef2f2", color: RED };
    return { ...base, opacity: 0.5 };
  }

  // ---- Fortschritt sichern / laden (geräteübergreifend per Code) ----
  function exportProgress() {
    const payload = JSON.stringify({ prog: progress, str: strength });
    const code = btoa(unescape(encodeURIComponent(payload)));
    try {
      navigator.clipboard.writeText(code);
      window.alert("Fortschritts-Code wurde in die Zwischenablage kopiert. Speichere ihn, um ihn auf einem anderen Gerät zu laden.");
    } catch {
      window.prompt("Kopiere diesen Fortschritts-Code und bewahre ihn auf:", code);
    }
  }
  function importProgress() {
    const code = window.prompt("Füge deinen Fortschritts-Code ein:");
    if (!code) return;
    try {
      const data = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      if (data.prog) { setProgress(data.prog); saveJSON("drill2mode_prog", data.prog); }
      if (data.str) { setStrength(data.str); saveJSON("drill2mode_strength", data.str); }
      window.alert("Fortschritt geladen!");
    } catch {
      window.alert("Code ungültig. Bitte prüfe, ob du ihn vollständig eingefügt hast.");
    }
  }

  // ===== MODUS-AUSWAHL =====
  if (!mode) {
    return (
      <div style={S.wrap}>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />

        <p style={S.sub}>Wähle, was du trainieren willst.</p>
        <button style={S.modeBtn} onClick={() => setMode("praep")}>
          <div style={{ fontSize: 19, fontWeight: 700, color: "#111827" }}>Präposition + Kasus</div>
          <div style={{ fontSize: 14, color: "#6b7280", marginTop: 4 }}>Welche Präposition und welcher Kasus gehören zum Wort? (445 Karten)</div>
        </button>
        <button style={S.modeBtn} onClick={() => setMode("bedeutung")}>
          <div style={{ fontSize: 19, fontWeight: 700, color: "#111827" }}>Bedeutung 中文</div>
          <div style={{ fontSize: 14, color: "#6b7280", marginTop: 4 }}>Was bedeutet das Wort? Alle Einträge (455 Karten)</div>
        </button>
        <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 22 }}>
          <button onClick={exportProgress} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 13, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline" }}>Fortschritt sichern</button>
          <button onClick={importProgress} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 13, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline" }}>Fortschritt laden</button>
        </div>
      </div>
    );
  }

  // ===== BLOCK-MENÜ =====
  if (!part) {
    const modeLabel = mode === "praep" ? "Präposition + Kasus" : "Bedeutung 中文";
    const doneCount = PARTS.filter((p) => progress[mode + "|" + p.id]?.done).length;
    const levels = ["Alle", "A2", "B1", "B2"];
    const visible = PARTS.filter((p) => filter === "Alle" || p.niveau === filter);
    return (
      <div style={S.wrap}>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
        <button style={S.backBtn} onClick={() => { setMode(null); setFilter("Alle"); }}>← Modus wechseln</button>
        <h1 style={S.h1}>{modeLabel}</h1>
        <p style={S.sub}>
          In Teile geteilt, Präpositionen bunt gemischt. Schwache Karten kommen zuerst und werden öfter wiederholt.
          {doneCount > 0 && <span style={{ color: ORANGE_L }}> · {doneCount}/{PARTS.length} Teile geübt</span>}
        </p>
        <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
          {levels.map((l) => {
            const active = filter === l;
            const lc = l === "Alle" ? { main: ORANGE, soft: "#fff6f0", border: ORANGE } : levelColor(l);
            return (
              <button key={l} onClick={() => setFilter(l)}
                style={{ padding: "7px 16px", borderRadius: 999, border: active ? `2px solid ${lc.main}` : "1px solid #e5e7eb", background: active ? lc.soft : "#fff", color: active ? lc.main : "#6b7280", cursor: "pointer", fontSize: 14, fontWeight: active ? 700 : 400 }}>
                {l}
              </button>
            );
          })}
        </div>
        <div style={{ display: "grid", gap: 10 }}>
          {visible.map((p) => {
            const pr = progress[mode + "|" + p.id];
            const cards = mode === "praep" ? p.items.filter((it) => it.praepOk) : p.items;
            const mastered = cards.filter((it) => (strength[mode + "|" + cardKey(it)] || 0) >= 4).length;
            const lc = levelColor(p.niveau);
            const rest = p.title.replace(p.niveau, "").replace(/^\s*·\s*/, "").trim(); // "Teil 1/2"
            return (
              <button key={p.id} onClick={() => startPart(p)}
                style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#fff", border: `1px solid ${lc.border}`, borderLeft: `5px solid ${lc.main}`, borderRadius: 14, padding: "15px 18px", cursor: "pointer", textAlign: "left", fontFamily: "inherit" }}>
                <div>
                  <div style={{ fontSize: 17, fontWeight: 600, color: "#111827", display: "flex", alignItems: "center", gap: 9 }}>
                    <span style={{ background: lc.soft, color: lc.main, fontWeight: 700, fontSize: 13, padding: "3px 9px", borderRadius: 7 }}>{p.niveau}</span>
                    <span>{rest}</span>
                  </div>
                  <div style={{ fontSize: 13, color: "#9ca3af", marginTop: 4 }}>{mastered} / {cards.length} Karten sitzen</div>
                </div>
                <div style={{ textAlign: "right", minWidth: 70 }}>
                  {pr?.done
                    ? <span style={{ color: pr.best >= 80 ? GREEN : ORANGE, fontWeight: 700, fontSize: 15 }}>{pr.best >= 80 ? "✓ " : ""}{pr.best}%</span>
                    : <span style={{ color: lc.main, fontSize: 22 }}>→</span>}
                </div>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ===== DRILL =====
  const lc = levelColor(part.niveau);
  return (
    <div style={S.wrap}>
      <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
      <button style={S.backBtn} onClick={() => { setPart(null); setPicked(null); }}>← Zurück zur Übersicht</button>
      <div style={{ ...S.card, borderTop: `4px solid ${lc.main}` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: lc.main, marginBottom: 4 }}>{part.title}</div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#9ca3af", marginBottom: 18 }}>
          <span>{idx + 1} / {queue.length}</span>
          <span>🔥 {streak} · ✓ {session.correct}/{session.total}</span>
        </div>
        {q && (
          <>
            <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", color: ORANGE_L, marginBottom: 8 }}>{q.label}</div>
            <div style={{ fontSize: 26, fontWeight: 700, color: "#111827", margin: "6px 0 22px", lineHeight: 1.35 }}>{q.stem}</div>
            {q.options.map((opt) => (<button key={opt} style={optStyle(opt)} onClick={() => pick(opt)}>{opt}</button>))}
            {picked && (
              <div style={{ marginTop: 16 }}>
                <div style={{ background: "#f9fafb", borderRadius: 12, padding: 14, marginBottom: 14 }}>
                  <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 4 }}>
                    {q.it.wort}
                    {mode === "praep" && q.validSet && q.validSet.length > 1
                      ? " · " + q.validSet.join(" / ")
                      : " · " + q.it.combo}
                  </div>
                  <div style={{ fontStyle: "italic", color: "#374151" }}>{q.it.bsp}</div>
                  <div style={{ color: "#9ca3af", fontSize: 14, marginTop: 2 }}>{q.it.cnt}</div>
                </div>
                <button style={S.btn} onClick={next}>{idx + 1 >= queue.length ? "Teil beenden" : "Weiter →"}</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
